name: Publish to crates.io

# Publishes the `dbos` crate when a version tag (e.g. `v0.1.0`) is pushed, or on manual dispatch.
#
# Requires a repository secret `CARGO_REGISTRY_TOKEN` (a crates.io API token with publish scope:
# crates.io → Account Settings → API Tokens).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run `cargo publish --dry-run` only (no upload)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish dbos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Verify the package builds and packages cleanly (no DB needed — this is a build, not tests).
      - name: Package check
        run: cargo publish -p dbos --locked --dry-run

      - name: Publish
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: cargo publish -p dbos --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
